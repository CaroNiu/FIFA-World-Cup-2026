<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Trophy ring -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="url(#ring)" stroke-width="3"/>

  <!-- Soccer ball -->
  <circle cx="64" cy="64" r="38" fill="#FFFFFF" stroke="#212121" stroke-width="2"/>

  <!-- Center pentagon -->
  <polygon points="64,42 80,53 73,72 55,72 48,53" fill="#212121"/>

  <!-- Seams from pentagon to outer edge -->
  <line x1="64" y1="42" x2="64" y2="26" stroke="#212121" stroke-width="2"/>
  <line x1="80" y1="53" x2="96" y2="50" stroke="#212121" stroke-width="2"/>
  <line x1="73" y1="72" x2="86" y2="92" stroke="#212121" stroke-width="2"/>
  <line x1="55" y1="72" x2="42" y2="92" stroke="#212121" stroke-width="2"/>
  <line x1="48" y1="53" x2="32" y2="50" stroke="#212121" stroke-width="2"/>

  <!-- 2026 label -->
  <rect x="44" y="98" width="40" height="18" rx="4" fill="#FFD54F" stroke="#F57F17" stroke-width="1"/>
  <text x="64" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#212121">2026</text>
</svg>
